<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(76,76)">
    <!-- 4x4 grid lines -->
    <line x1="0" y1="90" x2="360" y2="90" stroke="#334155" stroke-width="1.5"/>
    <line x1="0" y1="180" x2="360" y2="180" stroke="#334155" stroke-width="1.5"/>
    <line x1="0" y1="270" x2="360" y2="270" stroke="#334155" stroke-width="1.5"/>
    <line x1="90" y1="0" x2="90" y2="360" stroke="#334155" stroke-width="1.5"/>
    <line x1="180" y1="0" x2="180" y2="360" stroke="#334155" stroke-width="1.5"/>
    <line x1="270" y1="0" x2="270" y2="360" stroke="#334155" stroke-width="1.5"/>
    <!-- Flow A (blue): staircase top-left to mid -->
    <path d="M 45 45 L 135 45 L 135 135 L 225 135" fill="none" stroke="#60a5fa" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="45" cy="45" r="26" fill="#60a5fa"/>
    <circle cx="225" cy="135" r="26" fill="#60a5fa"/>
    <!-- Flow B (orange): L-shape top-right -->
    <path d="M 225 45 L 315 45 L 315 135 L 315 225" fill="none" stroke="#fb923c" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="225" cy="45" r="26" fill="#fb923c"/>
    <circle cx="315" cy="225" r="26" fill="#fb923c"/>
    <!-- Flow C (green): L-shape bottom-left -->
    <path d="M 45 135 L 45 225 L 45 315 L 135 315" fill="none" stroke="#4ade80" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="45" cy="135" r="26" fill="#4ade80"/>
    <circle cx="135" cy="315" r="26" fill="#4ade80"/>
    <!-- Flow D (violet): staircase mid to bottom-right -->
    <path d="M 135 225 L 225 225 L 225 315 L 315 315" fill="none" stroke="#a78bfa" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="135" cy="225" r="26" fill="#a78bfa"/>
    <circle cx="315" cy="315" r="26" fill="#a78bfa"/>
  </g>
</svg>
